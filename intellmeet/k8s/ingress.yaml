apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intellmeet-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "intellmeet-backend-service"
spec:
  rules:
    - host: intellmeet.app
      http:
        paths:
          # Route WebSocket signaling and API endpoints to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: intellmeet-backend-service
                port:
                  number: 8080
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: intellmeet-backend-service
                port:
                  number: 8080
          # Route all other web requests to React client
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intellmeet-frontend-service
                port:
                  number: 80
